name: Bug report
description: Report a reproducible problem in Cognisync.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the smallest sequence that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and any adapter or CLI details.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell

name: Feature request
description: Propose an improvement to Cognisync.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Workflow problem
      description: What workflow is blocked or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you want.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Why it matters
      description: Who benefits and how?
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals or constraints
      description: Anything we should intentionally avoid?

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate bytecode compilation
        run: PYTHONPYCACHEPREFIX=/tmp/cognisync-pyc python -m compileall src tests

      - name: Smoke test CLI entrypoint
        run: python -m cognisync --help

      - name: Smoke test demo workspace generation
        run: python -m cognisync demo /tmp/cognisync-demo

      - name: Smoke test doctor on demo workspace
        run: python -m cognisync doctor --workspace /tmp/cognisync-demo --strict

      - name: Smoke test lint on demo workspace
        run: python -m cognisync lint --workspace /tmp/cognisync-demo --strict
